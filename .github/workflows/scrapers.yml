name: Scrapers de Precios

on:
  schedule:
    # 6am y 6pm hora El Salvador (UTC-6) = 12:00 y 00:00 UTC
    - cron: '0 12,0 * * *'
  workflow_dispatch:
    inputs:
      supermercados:
        description: 'Supermercados VTEX a ejecutar (vacío = todos: walmart donjuan maxidespensa)'
        required: false
        default: ''
        type: string
      incluir_selectos:
        description: 'Incluir Selectos (Playwright)'
        required: false
        default: 'true'
        type: boolean

jobs:
  scrape-vtex:
    name: VTEX (Walmart / Don Juan / Maxi Despensa)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install httpx

      - name: Ejecutar scrapers VTEX
        run: |
          SUPERS="${{ github.event.inputs.supermercados }}"
          if [ -n "$SUPERS" ]; then
            python scripts/scrape_vtex_rest.py $SUPERS
          else
            python scripts/scrape_vtex_rest.py
          fi

  scrape-selectos:
    name: Selectos (Playwright)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' || github.event.inputs.incluir_selectos == 'true' }}

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SELECTOS_EMAIL: ${{ secrets.SELECTOS_EMAIL }}
      SELECTOS_PASSWORD: ${{ secrets.SELECTOS_PASSWORD }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install httpx playwright

      - name: Instalar Chromium
        run: python -m playwright install --with-deps chromium

      - name: Ejecutar scraper Selectos
        run: python scripts/scrape_selectos_rest.py

  normalizar:
    name: Normalización NLP cross-store
    runs-on: ubuntu-22.04
    needs: [scrape-vtex, scrape-selectos]
    if: always() && (needs.scrape-vtex.result == 'success' || needs.scrape-selectos.result == 'success')
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install httpx google-generativeai

      - name: Ejecutar normalización NLP
        run: python scripts/normalizar_productos.py

  notificar:
    name: Notificar resultado
    runs-on: ubuntu-22.04
    needs: [scrape-vtex, scrape-selectos, normalizar]
    if: always()
    steps:
      - name: Resumen
        run: |
          echo "VTEX:          ${{ needs.scrape-vtex.result }}"
          echo "Selectos:      ${{ needs.scrape-selectos.result }}"
          echo "Normalización: ${{ needs.normalizar.result }}"
          if [[ "${{ needs.scrape-vtex.result }}" == "failure" || "${{ needs.scrape-selectos.result }}" == "failure" ]]; then
            echo "::warning::Uno o más scrapers fallaron. Revisa los logs."
          fi
